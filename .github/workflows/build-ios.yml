name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Kotlin
        run: |
          chmod +x gradlew
          ./gradlew --version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ВАЖНО: Устанавливаем переменные для Xcode
      - name: Set Xcode environment variables
        run: |
          echo "DEVELOPER_DIR=$(xcode-select -p)" >> $GITHUB_ENV
          echo "SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)" >> $GITHUB_ENV
          echo "PLATFORM_NAME=iphoneos" >> $GITHUB_ENV
          echo "CURRENT_ARCH=arm64" >> $GITHUB_ENV

      # Альтернативный способ сборки iOS framework
      - name: Build iOS Framework
        run: |
          # Собираем для конкретной архитектуры
          ./gradlew :composeApp:linkDebugFrameworkIosArm64 \
            -Pkotlin.native.cocoapods.generate.wrapper=true \
            --stacktrace

      - name: Prepare Xcode project
        run: |
          cd iosApp
          # Если есть Podfile
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Build iOS App
        run: |
          cd iosApp
          
          # Определяем какой проект использовать
          if [ -f "iosApp.xcworkspace" ]; then
            WORKSPACE="iosApp.xcworkspace"
          else
            WORKSPACE="iosApp.xcodeproj"
          fi
          
          # Сборка для физического устройства
          xcodebuild -$WORKSPACE \
                     -scheme iosApp \
                     -configuration Debug \
                     -sdk iphoneos \
                     -arch arm64 \
                     CODE_SIGNING_ALLOWED=NO \
                     SKIP_INSTALL=NO \
                     build

      - name: Create IPA
        run: |
          cd iosApp
          
          # Создаем Payload директорию
          mkdir -p Payload
          
          # Копируем .app (путь может отличаться)
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            # Пробуем другой возможный путь
            APP_PATH=$(find . -name "*.app" -type d -not -path "*/Payload/*" | head -n 1)
          fi
          
          if [ ! -z "$APP_PATH" ]; then
            cp -r "$APP_PATH" Payload/
            zip -r app.ipa Payload
            echo "✅ IPA created successfully"
          else
            echo "❌ Could not find .app bundle"
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: iosApp/app.ipa
          retention-days: 7