name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Ручной запуск

jobs:
  build-ios:
    runs-on: macos-latest  # GitHub предоставляет macOS среду

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Kotlin
        run: |
          chmod +x gradlew
          ./gradlew --version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build iOS Framework
        run: |
          ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode

      - name: Prepare Xcode project
        run: |
          cd iosApp
          pod install  # если используете CocoaPods

      - name: Build iOS App
        run: |
          cd iosApp
          xcodebuild -workspace iosApp.xcworkspace \
                     -scheme iosApp \
                     -configuration Debug \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     build

      - name: Create IPA (для установки на iPhone)
        run: |
          cd iosApp
          mkdir -p Payload
          cp -r build/Build/Products/Debug-iphoneos/iosApp.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: iosApp/app.ipa
          retention-days: 7