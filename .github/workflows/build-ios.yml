name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Kotlin
        run: |
          chmod +x gradlew
          ./gradlew --version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Сборка Kotlin Multiplatform фреймворка
      - name: Build Kotlin Framework
        run: |
          # Устанавливаем переменные для Xcode
          echo "SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)" >> $GITHUB_ENV
          echo "PLATFORM_NAME=iphoneos" >> $GITHUB_ENV
          
          # Собираем для arm64 (физические устройства)
          ./gradlew :composeApp:linkDebugFrameworkIosArm64 \
            -Pkotlin.native.cocoapods.generate.wrapper=true \
            --stacktrace

      - name: Prepare Xcode project
        run: |
          cd iosApp
          
          # Проверяем наличие Podfile
          if [ -f "Podfile" ]; then
            echo "Installing CocoaPods dependencies..."
            pod install
          fi
          
          # Листинг доступных схем
          echo "Available schemes:"
          xcodebuild -list -project iosApp.xcodeproj

      # ВАЖНО: Исправленная команда с правильным синтаксисом
      - name: Build iOS App
        run: |
          cd iosApp
          
          # Определяем какой проект использовать
          if [ -f "iosApp.xcworkspace" ]; then
            # Используем workspace если есть
            xcodebuild -workspace iosApp.xcworkspace \
                       -scheme iosApp \
                       -configuration Debug \
                       -sdk iphoneos \
                       -arch arm64 \
                       CODE_SIGNING_ALLOWED=NO \
                       SKIP_INSTALL=NO \
                       build
          else
            # Используем project с правильным синтаксисом
            xcodebuild -project iosApp.xcodeproj \
                       -scheme iosApp \
                       -configuration Debug \
                       -sdk iphoneos \
                       -arch arm64 \
                       CODE_SIGNING_ALLOWED=NO \
                       SKIP_INSTALL=NO \
                       build
          fi

      - name: Create IPA
        run: |
          cd iosApp
          
          # Создаем Payload директорию
          mkdir -p Payload
          
          # Ищем .app bundle
          APP_PATH=$(find . -name "*.app" -type d -not -path "*/Payload/*" | head -n 1)
          
          if [ ! -z "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            cp -r "$APP_PATH" Payload/
            zip -r app.ipa Payload
            echo "✅ IPA created successfully"
          else
            echo "❌ Could not find .app bundle"
            # Поиск всех .app для отладки
            echo "Searching for .app bundles..."
            find . -name "*.app" -type d
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: iosApp/app.ipa
          retention-days: 7